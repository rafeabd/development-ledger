name: Refresh bill data

on:
  schedule:
    - cron: '20 10 * * *' # daily, 6:20am ET
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for API key
        id: keycheck
        run: |
          if [ -z "${{ secrets.LEGISCAN_API_KEY }}" ]; then
            echo "LEGISCAN_API_KEY secret not set — skipping refresh."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch bills from LegiScan
        if: steps.keycheck.outputs.present == 'true'
        env:
          LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}
        run: node scripts/fetch-bills.mjs

      - name: Fetch regulatory + news feeds
        continue-on-error: true
        run: node scripts/fetch-feeds.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "ledger-bot"
          git config user.email "actions@users.noreply.github.com"
          git add public/data/bills.json data/legiscan-cache.json public/data/signals.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: daily data refresh (bills + feeds)"
            git push
          fi
